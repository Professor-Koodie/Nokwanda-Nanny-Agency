<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nokwanda Nanny Agency - Contact</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Inherited styling from index.html */
    :root{
      --bg-a:#c0c2c5;
      --bg-b:#ffffff;
      --primary:#6e8efb;
      --accent:#8be7d0;
      --radius:14px;
      --shadow-lg:0 12px 30px rgba(2,6,23,0.6);
    }

    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      color:#0b1220;
      background:linear-gradient(
        180deg,
        var(--bg-a) 0%,
        var(--bg-b) 60%
      );
    }

    /* Hero section inherited from index */
    .hero-section{
      width:100%;
      height:600px;
      position:relative;
      overflow:hidden;
      background:#000;
      box-shadow:0 18px 40px rgba(0,0,0,0.35);
    }

    .hero-section img{
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:0.75;
    }

    .overlay-content{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#000;
      padding:20px;
      background:rgba(255,255,255,0.15);
    }

    .overlay-content h1{
      font-weight:800;
    }

    .overlay-content p{
      font-weight:600;
      max-width:700px;
    }

    /* Contact content */
    .content-section{
      padding:60px 20px;
    }

    .contact-card{
      background:#fff;
      border-radius:16px;
      padding:40px;
      max-width:700px;
      margin:0 auto;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      text-align:center;
    }

    .contact-card h2{
      margin-bottom:25px;
      font-weight:700;
    }

    .contact-item{
      font-size:1.15rem;
      margin:15px 0;
    }

    footer{
      background:#f1f1f1;
      color:#333;
      font-size:15px;
      border-top:2px solid #ccc;
    }

    @media (max-width:768px){
      .hero-section{
        height:320px;
      }

      .overlay-content h1{
        font-size:1.8rem;
      }

      .overlay-content p{
        font-size:0.95rem;
      }

      .contact-card{
        padding:28px;
      }
    }
  </style>
</head>

<body>

<!-- Navbar inherited from index.html -->
<header>
  <nav class="navbar navbar-expand-lg navbar-light w-100" style="background:#756f6f;">
    <div class="container-fluid">

      <a class="navbar-brand fw-bold text-dark" href="index.html">
        🏠 Nokwanda Nanny Agency
      </a>

      <button class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link text-dark" href="service.html">
              ⚙️ Services
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-dark" href="about.html">
              📰 About
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-dark active" href="contact.html">
              📞 Contact
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>
</header>

<!-- Hero Section -->
<div class="hero-section">

  <img src="baby2.jpg" alt="Contact Nokwanda Nanny Agency">

  <div class="overlay-content">
    <h1>Contact Us</h1>
    <p>
      We are here to help you find trusted childcare
      and answer any questions you may have.
    </p>
  </div>

</div>

<!-- Contact Details -->
<div class="container content-section">

  <div class="contact-card">

    <h2>Contact Details</h2>

    <div class="contact-item">
      <strong>Email:</strong><br>
      mafusenzo7@gmail.com
    </div>

    <div class="contact-item">
      <strong>Phone:</strong><br>
      +27 61 492 9047
    </div>

  </div>

</div>

<!-- Footer inherited from index -->
<footer class="text-center py-4 w-100">
  &copy; 2026 Nokwanda Nanny Agency.
  All rights reserved.
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
